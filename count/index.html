<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Validate every decision before you commit. Proprietary framework powered by engineered algorithms delivering actionable information.">
  <title>Validate Every Decision Before You Commit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <section class="hero" id="hero-section">
    <!-- Background grid overlay -->
    <div class="grid-overlay" aria-hidden="true"></div>
    <!-- Green glow band -->
    <div class="green-glow" aria-hidden="true"></div>

    <div class="hero-content">
      <!-- Top navigation tags -->
      <nav class="top-nav" id="top-nav">
        <a href="#" class="nav-tag" id="nav-test">TEST</a>
        <a href="#" class="nav-tag" id="nav-learn">LEARN</a>
        <a href="#" class="nav-tag" id="nav-data">DATA</a>
        <a href="#" class="nav-tag" id="nav-info">INFO</a>
      </nav>

      <h1 class="hero-headline" id="hero-headline">
        <span class="headline-green">Validate Every Decision</span>
        <span class="headline-white">Before You Commit</span>
      </h1>

      <p class="hero-subtitle" id="hero-subtitle">
        <span class="seats-limit">LIMITED TO 248 SEATS.</span> Proprietary framework powered by algorithms providing
        actionable information.
      </p>

      <!-- ============================================
           FLIP CLOCK COUNTER — 124 / 248
           ============================================ -->
      <div class="flip-counter-wrapper" id="flip-counter">
        <div class="flip-counter-group flip-white" id="counter-current">
          <div class="flip-card" id="fc-d1">
            <div class="flip-inner"><span class="flip-digit">1</span></div>
          </div>
          <div class="flip-card" id="fc-d2">
            <div class="flip-inner"><span class="flip-digit">2</span></div>
          </div>
          <div class="flip-card" id="fc-d3">
            <div class="flip-inner"><span class="flip-digit">4</span></div>
          </div>
        </div>
        <div class="flip-slash">/</div>
        <div class="flip-counter-group flip-green" id="counter-total">
          <div class="flip-card" id="fc-d4">
            <div class="flip-inner"><span class="flip-digit">2</span></div>
          </div>
          <div class="flip-card" id="fc-d5">
            <div class="flip-inner"><span class="flip-digit">4</span></div>
          </div>
          <div class="flip-card" id="fc-d6">
            <div class="flip-inner"><span class="flip-digit">8</span></div>
          </div>
        </div>
      </div>

      <div class="feature-pills" id="feature-pills">
        <div class="pill" id="pill-ai-engine">
          <svg class="pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="16" height="16" rx="2" />
            <circle cx="9" cy="9" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="15" cy="9" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="9" cy="15" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="15" cy="15" r="1.5" fill="currentColor" stroke="none" />
            <line x1="9" y1="10.5" x2="9" y2="13.5" />
            <line x1="15" y1="10.5" x2="15" y2="13.5" />
            <line x1="10.5" y1="9" x2="13.5" y2="9" />
            <line x1="10.5" y1="15" x2="13.5" y2="15" />
          </svg>
          <span>AI-Engine</span>
        </div>

        <div class="pill" id="pill-major-markets">
          <svg class="pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
          </svg>
          <span>Major Markets</span>
        </div>

        <div class="pill" id="pill-backtesting">
          <svg class="pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="7" y1="17" x2="7" y2="13" />
            <line x1="12" y1="17" x2="12" y2="9" />
            <line x1="17" y1="17" x2="17" y2="5" />
          </svg>
          <span>Robust Backtesting</span>
        </div>

        <div class="pill" id="pill-forecasting">
          <svg class="pill-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <circle cx="12" cy="12" r="7" stroke-dasharray="2 2" />
            <circle cx="12" cy="12" r="10" />
          </svg>
          <span>Calibrated Forecasting</span>
        </div>
      </div>

      <a href="#simulator" class="cta-button" id="cta-test-now">TEST IT NOW</a>
    </div>
  </section>


</body>

</html>
